<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CL Contract AI - 계약서 위험 분석</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; }

.nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #fff; border-bottom: 0.5px solid #e8e8e4; }
.nav-logo { font-size: 14px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.01em; }
.nav-badge { font-size: 11px; color: #888; background: #f0f0ee; padding: 4px 10px; border-radius: 20px; }

.hero { padding: 56px 24px 40px; text-align: center; background: #fff; border-bottom: 0.5px solid #e8e8e4; }
.hero-title { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1.15; margin-bottom: 14px; letter-spacing: -0.03em; }
.hero-sub { font-size: 15px; color: #888; line-height: 1.6; max-width: 400px; margin: 0 auto; }

.main { max-width: 680px; margin: 0 auto; padding: 32px 24px 60px; }

.input-card { background: #fff; border: 0.5px solid #e8e8e4; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
.input-label { font-size: 11px; font-weight: 600; color: #bbb; letter-spacing: 0.08em; margin-bottom: 10px; }
textarea { width: 100%; height: 200px; background: transparent; border: none; outline: none; font-size: 14px; color: #1a1a1a; font-family: inherit; resize: vertical; line-height: 1.7; -webkit-appearance: none; }
textarea::placeholder { color: #ccc; }

.btn { width: 100%; height: 50px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; -webkit-appearance: none; touch-action: manipulation; }
.btn:active { opacity: 0.75; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

.disclaimer { font-size: 11px; color: #ccc; text-align: center; margin-top: 10px; line-height: 1.6; }

.result { margin-top: 24px; }
.result-label { font-size: 11px; font-weight: 600; color: #bbb; letter-spacing: 0.08em; margin-bottom: 12px; }

.card { background: #fff; border: 0.5px solid #e8e8e4; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; }
.card-icon { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.icon-red { background: #fff0f0; }
.icon-yellow { background: #fffbea; }
.icon-green { background: #f0fff4; }
.icon-blue { background: #f0f4ff; }
.card-inner { flex: 1; min-width: 0; }
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-bottom: 5px; }
.badge-red { background: #fff0f0; color: #c44; }
.badge-yellow { background: #fffbea; color: #a07000; }
.badge-green { background: #f0fff4; color: #276749; }
.badge-blue { background: #f0f4ff; color: #3355cc; }
.card-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.card-body { font-size: 13px; color: #888; line-height: 1.6; white-space: pre-wrap; word-break: keep-all; }

.dots { display: inline-flex; gap: 5px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; animation: b 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes b { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

@media (min-width: 600px) {
  .hero { padding: 72px 40px 48px; }
  .hero-title { font-size: 44px; }
  .main { padding: 40px 40px 80px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">CL Contract AI</div>
  <div class="nav-badge">베타 · 무료</div>
</nav>

<div class="hero">
  <div class="hero-title">계약서 위험조항을<br>AI가 찾아드립니다</div>
  <div class="hero-sub">붙여넣기만 하면 30초 안에 위험조항, 수정 제안, 협상 포인트까지 분석해드립니다</div>
</div>

<div class="main">
  <div class="input-card">
    <div class="input-label">계약서 내용</div>
    <textarea id="txt" placeholder="계약서 전문을 여기에 붙여넣으세요...&#10;&#10;예) 제1조 (목적) 본 계약은..."></textarea>
  </div>
  <button class="btn" id="btn" onclick="go()">분석 시작</button>
  <p class="disclaimer">※ AI 참고자료이며 법률 자문이 아닙니다. 중요한 계약은 전문가와 상담하세요.</p>
  <div id="result"></div>
</div>

<script>
async function go() {
  var txt = document.getElementById('txt').value.trim();
  var btn = document.getElementById('btn');
  var resultEl = document.getElementById('result');
  if (!txt) { alert('계약서 내용을 입력해주세요.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
  resultEl.innerHTML = '';

  try {
    var res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: txt })
    });
    var raw = await res.text();
    var data;
    try { data = JSON.parse(raw); } catch(e) {
      resultEl.innerHTML = card('blue', '오류', '응답 오류. 다시 시도해주세요.');
      return;
    }
    if (data.error) { resultEl.innerHTML = card('blue', '오류', data.error); return; }

    var h = '<div class="result-label">분석 결과</div>';
    if (data.summary) h += card('blue', '계약서 개요', data.summary, '요약');
    (data.risks||[]).forEach(function(r) {
      var color = r.level==='high'?'red':r.level==='medium'?'yellow':'green';
      var label = r.level==='high'?'위험 높음':r.level==='medium'?'주의':'낮음';
      var icon = r.level==='high'?'⚠️':r.level==='medium'?'💡':'✓';
      h += card(color, r.title||'', r.detail||'', label, icon);
    });
    if (data.keyPoints&&data.keyPoints.length) h += card('blue', '주요 포인트', data.keyPoints.map(function(p,i){return (i+1)+'. '+p;}).join('\n'), '핵심', '📌');
    if (data.suggestions&&data.suggestions.length) h += card('yellow', '수정 제안', data.suggestions.map(function(s,i){return (i+1)+'. '+s;}).join('\n'), '제안', '✏️');
    if (data.negotiation&&data.negotiation.length) h += card('green', '협상 포인트', data.negotiation.map(function(n,i){return (i+1)+'. '+n;}).join('\n'), '협상', '🤝');

    resultEl.innerHTML = h;
    resultEl.scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    resultEl.innerHTML = card('blue', '오류', e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '분석 시작';
  }
}

function card(color, title, body, badge, icon) {
  var ic = icon || (color==='red'?'⚠️':color==='yellow'?'💡':color==='green'?'✓':'📄');
  var bd = badge || title;
  return '<div class="card">'
    + '<div class="card-icon icon-'+color+'">'+ic+'</div>'
    + '<div class="card-inner">'
    + '<div class="badge badge-'+color+'">'+bd+'</div>'
    + '<div class="card-title">'+title+'</div>'
    + '<div class="card-body">'+(body||'')+'</div>'
    + '</div></div>';
}
</script>
</body>
</html>
